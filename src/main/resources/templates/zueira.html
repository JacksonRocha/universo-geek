<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zueira - Universo Geek</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap"
          rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: #ec4899;
            margin-bottom: 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            text-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .main-image {
            max-width: 90%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            max-height: 60vh;
            object-fit: contain;
        }

        .qr-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .qr-section p {
            margin-top: 0;
            color: #cbd5e1;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        #qrcode {
            background: white;
            padding: 10px;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        #qrcode:hover {
            transform: scale(1.05);
        }

        .btn-home {
            margin-top: 30px;
            padding: 10px 20px;
            background: transparent;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .btn-voltar {
            background: #ec4899; /* Pink as in home hero */
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .btn-voltar:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6);
            background: #d61f69;
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
        <a href="/home" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar para Universo Geek
        </a>
    </div>

<h1>Toma Curioso! 😂</h1>

<!-- 👇 TROQUE O LINK DA IMAGEM ABAIXO QUANDO QUISER MUDAR A ZUEIRA 👇 -->
<img th:src="${imagemUrl}" alt="Imagem Surpresa" class="main-image">

<!-- ZONA Oculta para Usuários Logados -->
<th:block th:if="${logado}">
    <div style="margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px dashed #ec4899;">
        <p style="color: #ec4899; font-weight: bold; margin-top: 0;">Área Secreta do Admin: Trocar a Zueira</p>
        <input type="text" id="novaImagem" placeholder="Cole a URL da nova imagem aqui" style="width: 300px; max-width: 100%; padding: 8px; border-radius: 4px; border: none; margin-bottom: 10px;">
        <br>
        <button onclick="mudarImagem()" style="padding: 8px 15px; background: #ec4899; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Gerar Novo Link e QR Code!</button>
        <p style="font-size: 0.8rem; color: #cbd5e1; margin-bottom: 0; margin-top: 10px;">Ao alterar, o QR code lá de baixo e o Link do topo serão atualizados com esta nova foto!</p>
    </div>
    <script>
        function mudarImagem() {
            const url = document.getElementById('novaImagem').value;
            if(url) {
                window.location.href = '/zueira?img=' + encodeURIComponent(url);
            }
        }
    </script>
</th:block>

<div class="qr-section">
    <p>Gere o terror! Tire um print ou escaneie o QR Code abaixo<br> para mandar essa página exata para alguém.</p>
    <img id="qrcode" src="" alt="QR Code desta página">
</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        const currentUrl = window.location.href;
        const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(currentUrl);
        document.getElementById('qrcode').src = qrUrl;
    </script>

</body>
</html>
