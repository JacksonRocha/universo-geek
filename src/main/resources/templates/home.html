<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Geek Universo - Home</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #000 url('/images/stars-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #0a0a0a;
            padding: 10px 40px;
            border-bottom: 2px solid #800080;
        }

        .logo {
            height: 100px; /* mantém a altura real */
            transform: scale(1.8); /* aumenta visualmente a logo */
            transform-origin: left center; /* ancora a ampliação à esquerda */
        }


        .search-box {
            flex-grow: 1;
            max-width: 600px;
            margin: 0 40px;
            display: flex;
            border-radius: 8px;
            overflow: hidden;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            outline: none;
            background-color: #1f1f2e;
            color: #fff;
            font-size: 14px;
        }

        .search-box button {
            background-color: #800080;
            color: white;
            border: none;
            padding: 0 20px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .search-box button:hover {
            background-color: #a44caa;
        }

        .login-btn {
            background-color: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background-color: #00ffff;
            color: black;
        }

        .banner-container {
            width: 100%;
            background-color: #000;
        }

        .banner-container img {
            width: 100%;
            max-height: 430px;
            object-fit: cover;
            display: block;
        }

        .social-links {
            display: flex;
            justify-content: center;
            margin: 30px 0 10px;
        }

        .social-links a img {
            width: 50px;
            margin: 0 20px;
            transition: transform 0.3s;
        }

        .social-links a img:hover {
            transform: scale(1.2);
        }

        .news-section {
            padding: 30px;
            background-color: rgba(0, 0, 0, 0.6);
            max-width: 900px;
            margin: 30px auto 50px;
            border-radius: 10px;
        }

        .news-section h2 {
            color: #ffccff;
            font-size: 26px;
        }

        .news-section p {
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>

<header>
    <img src="/images/logo-universo-geek.png" alt="Logo Geek Universo" class="logo">

    <div class="search-box">
        <input type="text" placeholder="Pesquisar...">
        <button>🔍</button>
    </div>

    <button class="login-btn" onclick="window.location.href='/login'">Login</button>
</header>

<div class="banner-container">
    <img id="banner" src="/images/banner1.jpg" alt="Banner Dinâmico">
</div>

<div class="social-links">
    <a href="https://www.instagram.com/seuPerfil" target="_blank">
        <img src="/images/logo-instagram.png" alt="Instagram">
    </a>
    <a href="https://www.youtube.com/seuCanal" target="_blank">
        <img src="/images/logo-youtube.png" alt="YouTube">
    </a>
    <a href="https://www.mercadolivre.com.br/perfil/suaLoja" target="_blank">
        <img src="/images/logo-mercado-livre.png" alt="Mercado Livre">
    </a>
</div>

<div class="news-section">
    <h2>Notícias Geek</h2>
    <p>Confira os lançamentos de filmes, séries e jogos em 2025!</p>
</div>

<script>
    const banners = [
        "/images/banner1.jpg",
        "/images/banner2.jpg",
        "/images/banner3.jpg"
    ];
    let current = 0;

    setInterval(() => {
        current = (current + 1) % banners.length;
        document.getElementById("banner").src = banners[current];
    }, 8000);
</script>

</body>
</html>
