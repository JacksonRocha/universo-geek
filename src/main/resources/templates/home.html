<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Geek - Portal Oficial</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            --accent-hot: #ec4899; /* Vibrant Pink */
            --accent-cool: #0ea5e9; /* Light Blue */
            --header-bg: rgba(15, 23, 42, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Nav & Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-img {
            height: 45px;
            filter: drop-shadow(0 0 8px rgba(14, 165, 233, 0.5));
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-transform: uppercase;
        }
        .logo-text span {
            color: var(--accent-cool);
        }

        .search-container {
            flex-grow: 1;
            max-width: 400px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-cool);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cool), #3b82f6);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6);
        }

        .btn-dashboard {
            background: linear-gradient(135deg, var(--accent-hot), #f43f5e);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }
        
        .btn-dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6);
        }

        /* Hero Carousel */
        .hero {
            margin-top: 76px;
            position: relative;
            height: 60vh;
            min-height: 500px;
            display: flex;
            align-items: flex-end;
            padding-bottom: 50px;
            overflow: hidden;
            background: #000;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(15, 23, 42, 1) 0%, rgba(15,23,42,0.4) 50%, rgba(15,23,42,0.1) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
            padding: 0 30px;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s ease forwards 0.5s;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .hero-badge {
            display: inline-block;
            background: var(--accent-hot);
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }

        .hero-title {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 15px;
            max-width: 800px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .hero-desc {
            font-size: 1.1rem;
            color: #cbd5e1;
            max-width: 600px;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .hero-indicators {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 5;
        }

        .indicator {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .indicator.active {
            background: var(--accent-cool);
            box-shadow: 0 0 10px var(--accent-cool);
        }

        /* Main Content */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 30px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -16px;
            width: 60px;
            height: 4px;
            background: var(--accent-cool);
            border-radius: 2px;
        }

        .section-title.geek::after {
            background: var(--accent-hot);
        }

        /* News Grid */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .news-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            text-decoration: none;
        }

        .news-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-color: rgba(14, 165, 233, 0.3);
        }

        .geek-grid .news-card:hover { border-color: rgba(236, 72, 153, 0.3); }

        .image-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
            background: #000;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            opacity: 0.9;
        }

        .news-card:hover .image-wrapper img {
            transform: scale(1.08);
            opacity: 1;
        }

        .category-tag {
            position: absolute;
            bottom: 0;
            left: 0;
            background: #000;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 6px 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
        }

        .geek-tag { background: var(--accent-hot); }

        .card-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 15px;
            transition: color 0.3s;
        }

        .news-card:hover .card-title { color: var(--accent-cool); }
        .geek-grid .news-card:hover .card-title { color: var(--accent-hot); }

        .card-meta {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .loading-shimmer {
            height: 350px;
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Footer */
        footer {
            background: #0a0f18;
            padding: 40px 30px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 50px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .social-links a:hover {
            background: var(--accent-hot);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
        }

        .social-links img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        @media(max-width: 768px) {
            .hero-title { font-size: 2.2rem; }
            .nav-actions { display: none; }
            .search-container { display: none; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="nav-container">
            <a href="/" class="logo-area">
                <!-- Using a text logo with span to bypass the missing static image rendering nicely -->
                <div class="logo-text">Universo<span>Geek</span></div>
            </a>

            <div class="search-container">
                <input type="text" class="search-input" placeholder="Pesquisar notícias, filmes...">
            </div>

            <div class="nav-actions">
                <!-- Logged Out actions -->
                <div sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn btn-outline">Entrar</a>
                    <a href="/login" class="btn btn-primary">Registrar</a>
                </div>
                <!-- Logged In actions -->
                <div sec:authorize="isAuthenticated()">
                    <span style="margin-right: 15px; font-weight: 600;" sec:authentication="name">Usuário</span>
                    <a href="/finances" class="btn btn-dashboard">Dashboard</a>
                    <form th:action="@{/logout}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-outline">Sair</button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Carousel -->
    <section class="hero" id="hero-slider">
        <!-- JS will populate slides here -->
        <div class="hero-overlay"></div>
        <div class="hero-content" id="hero-content">
            <span class="hero-badge" id="hero-badge">Em Cartaz</span>
            <h1 class="hero-title" id="hero-title">Carregando Novidades...</h1>
            <p class="hero-desc" id="hero-desc">Buscando os melhores lançamentos nos cinemas mundiais.</p>
        </div>
        <div class="hero-indicators" id="hero-indicators"></div>
    </section>

    <!-- Main Content -->
    <main class="container">
        
        <!-- Tecmundo News Section -->
        <div class="section-header">
            <h2 class="section-title">Notícias Tecmundo</h2>
            <a href="https://www.tecmundo.com.br" target="_blank" style="color: var(--accent-cool); font-weight: 600; text-decoration: none;">Ver todas &rarr;</a>
        </div>
        
        <div class="news-grid" id="tecmundo-grid">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>

        <br><br><br>

        <!-- Jovem Nerd / Geek News Section -->
        <div class="section-header">
            <h2 class="section-title geek">Mundo Geek & Anime</h2>
            <a href="https://jovemnerd.com.br" target="_blank" style="color: var(--accent-hot); font-weight: 600; text-decoration: none;">Explorar &rarr;</a>
        </div>
        
        <div class="news-grid geek-grid" id="geek-grid">
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
            <div class="loading-shimmer"></div>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <div class="social-links">
            <a href="https://www.instagram.com" target="_blank"><img src="/images/logo-instagram.png" alt="Instagram" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1384/1384063.png'"></a>
            <a href="https://www.youtube.com" target="_blank"><img src="/images/logo-youtube.png" alt="YouTube" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1384/1384060.png'"></a>
            <a href="https://www.mercadolivre.com.br" target="_blank" title="Mercado Livre"><img src="/images/logo-mercado-livre.png" alt="Mercado Livre" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'"></a>
        </div>
        <p style="color: #64748b; font-size: 0.9rem;">&copy; 2026 Universo Geek. Todos os direitos reservados. Design inspirado em HQPop.</p>
    </footer>

    <!-- Scripts -->
    <script>
        // --- 1. Hero Carousel Logic ---
        const movies = [
            {
                title: "Duna: Parte Dois",
                desc: "A jornada mítica de Paul Atreides ganha seu ápice visual e narrativo. O filme do ano já está entre nós.",
                img: "https://image.tmdb.org/t/p/original/xOMo8BRK7PfcJv9JCnx7s5hj0PX.jpg",
                badge: "Em Alta"
            },
            {
                title: "Deadpool & Wolverine",
                desc: "O mercenário tagarela se une a Wolverine em uma aventura que mudará a linha do tempo do MCU para sempre.",
                img: "https://image.tmdb.org/t/p/original/9l1eZiJHmhr5jIlthMdJN5WYoff.jpg",
                badge: "Marvel Studios"
            },
            {
                title: "Godzilla e Kong: O Novo Império",
                desc: "Os titãs entram em colisão! Explore as profundezas da Terra Oca neste embate épico pela sobrevivência.",
                img: "https://image.tmdb.org/t/p/original/qrGtVFbrChJq0TFIPhG00k4dGF5.jpg",
                badge: "Lançamento"
            }
        ];

        const heroSlider = document.getElementById('hero-slider');
        const heroTitle = document.getElementById('hero-title');
        const heroDesc = document.getElementById('hero-desc');
        const heroBadge = document.getElementById('hero-badge');
        const indicatorsContainer = document.getElementById('hero-indicators');

        let currentSlideIndex = 0;

        // Create Slides Backgrounds
        movies.forEach((movie, index) => {
            const slide = document.createElement('div');
            slide.className = 'hero-slide';
            if(index === 0) slide.classList.add('active');
            slide.style.backgroundImage = `url('${movie.img}')`;
            heroSlider.prepend(slide);

            const indicator = document.createElement('div');
            indicator.className = 'indicator';
            if(index === 0) indicator.classList.add('active');
            indicator.onclick = () => goToSlide(index);
            indicatorsContainer.appendChild(indicator);
        });

        const slides = document.querySelectorAll('.hero-slide');
        const indicators = document.querySelectorAll('.indicator');

        function updateHeroContent(index) {
            const movie = movies[index];
            const contentDiv = document.getElementById('hero-content');
            
            // Re-trigger animation
            contentDiv.style.animation = 'none';
            contentDiv.offsetHeight; 
            contentDiv.style.animation = 'slideUp 0.8s ease forwards';

            heroTitle.textContent = movie.title;
            heroDesc.textContent = movie.desc;
            heroBadge.textContent = movie.badge;
        }

        function goToSlide(index) {
            slides[currentSlideIndex].classList.remove('active');
            indicators[currentSlideIndex].classList.remove('active');
            
            currentSlideIndex = index;
            
            slides[currentSlideIndex].classList.add('active');
            indicators[currentSlideIndex].classList.add('active');
            updateHeroContent(index);
        }

        // Initialize first slide UI
        updateHeroContent(0);

        setInterval(() => {
            goToSlide((currentSlideIndex + 1) % movies.length);
        }, 8000);


        // --- 2. RSS Feed Logic using RSS2JSON ---
        const RSS2JSON_API = 'https://api.rss2json.com/v1/api.json?rss_url=';

        async function fetchRSS(feedUrl, containerId, isGeek = false) {
            try {
                // To avoid CORS blocks from browsers, rss2json proxies perfectly
                const response = await fetch(RSS2JSON_API + encodeURIComponent(feedUrl));
                if (!response.ok) throw new Error("A requisição Falhou");
                
                const data = await response.json();
                if (data.status !== 'ok') throw new Error("Erro no feed");

                const container = document.getElementById(containerId);
                container.innerHTML = ''; // Limpar shimmers
                
                // Mostrar os ultimos 6 posts
                data.items.slice(0, 6).forEach(item => {
                    const date = new Date(item.pubDate).toLocaleDateString('pt-BR', { year: 'numeric', month: 'long', day: 'numeric' });
                    
                    // Extrair imagem do RSS 
                    let imgUrl = item.thumbnail || (item.enclosure && item.enclosure.link);
                    if (!imgUrl) {
                        const match = item.content.match(/<img[^>]+src="([^">]+)"/);
                        imgUrl = match ? match[1] : '/images/stars-bg.jpg';
                    }

                    // Tentar pegar autor
                    let author = item.author || (isGeek ? 'Redação Geek' : 'Redação Tecmundo');
                    // Limpar autor de formatacao se houver
                    if(author.length > 25) author = author.substring(0, 25) + '...';
                    
                    const categoryLabel = isGeek ? 'MUNDO GEEK' : 'TECNOLOGIA';
                    const tagClass = isGeek ? 'category-tag geek-tag' : 'category-tag';

                    const card = document.createElement('a');
                    card.href = item.link;
                    card.target = "_blank";
                    card.className = 'news-card';
                    
                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${imgUrl}" alt="Imagem do artigo" onerror="this.src='/images/stars-bg.jpg'">
                            <span class="${tagClass}">${categoryLabel}</span>
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${item.title}</h3>
                            <div class="card-meta">
                                <span>POR ${author.toUpperCase()}</span>
                                <span>🗓️ ${date}</span>
                            </div>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Erro buscando RSS:', error);
                document.getElementById(containerId).innerHTML = `
                    <div style="grid-column: 1/-1; padding: 30px; background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.3); border-radius: 8px;">
                        <h3 style="color: #f87171; margin-bottom:10px;">Não foi possível carregar as notícias.</h3>
                        <p style="color: #cbd5e1;">A API do feed RSS pode estar indisponível no momento ou atingiu o limite de consultas.</p>
                    </div>`;
            }
        }

        // Executar após carregar o DOM
        document.addEventListener('DOMContentLoaded', () => {
            // Feed Oficial do Tecmundo
            fetchRSS('https://www.tecmundo.com.br/rss', 'tecmundo-grid', false);
            
            // Feed Oficial do Jovem Nerd (Mundo Geek e Filmes)
            fetchRSS('https://jovemnerd.com.br/feed', 'geek-grid', true);
        });

    </script>
</body>
</html>
