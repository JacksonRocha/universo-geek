<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Develop - Universo Geek</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 100px 20px;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: -1;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.6;
        }

        .btn-voltar {
            position: fixed;
            top: 30px;
            left: 30px;
            background: #0ea5e9;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            font-size: 14px;
            z-index: 1000;
        }

        .btn-voltar:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.6);
            background: #0284c7;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <a href="/home" class="btn-voltar">
        <i class="fas fa-arrow-left"></i> Voltar para Universo Geek
    </a>
    <h1>💻 Página DEVELOP</h1>
    <p>Conteúdo de desenvolvimento de software, dicas de programação, projetos de tecnologia e muito mais para o seu ecossistema geek.</p>
</body>
</html>
